<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Simple Linux</title>
    <link rel="stylesheet" href="/shared/style.css">
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="main-container">

        <h1 class="page-title">Simple Linux</h1>

        <textarea
            class="input main-input"
            id="mainInput"
            placeholder="Scrie o comandă sau un serviciu..."
            rows="4"
        ></textarea>

        <button class="btn btn-primary main-btn" id="dashboardBtn">
            Services Dashboard
        </button>

        <div class="main-actions">
            <button class="btn btn-back-icon" id="infoBtn">Info</button>
            <button class="btn btn-back-icon" id="settingsBtn">Settings</button>
        </div>

    </div>

    <script src="main.js"></script>
</body>
</html>
